<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página em Manutenção - Cesar Pesoti Psicoterapia</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3366FF;
            --primary-dark: #1A3BB2;
            --bg: #F5F7FF;
            --text: #1F2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text);
        }

        /* Animated Background Blobs */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 { width: 500px; height: 500px; top: -100px; left: -100px; background: #3366FF; }
        .blob-2 { width: 600px; height: 600px; bottom: -150px; right: -150px; background: #5C8AFF; }
        .blob-3 { width: 300px; height: 300px; top: 40%; left: 60%; background: #A0B3FF; opacity: 0.3; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 50px) scale(1.1); }
            100% { transform: translate(-50px, 100px) scale(0.9); }
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 40px 80px -20px rgba(51, 102, 255, 0.15);
            animation: cardAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .img-logo {
            height: 60px;
            margin: 0 auto;
            display: block;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(51, 102, 255, 0.08);
            color: var(--primary);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(51, 102, 255, 0.1);
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 30px;
            box-shadow: 0 15px 30px rgba(51, 102, 255, 0.3);
            animation: pulse 2s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 15px 30px rgba(51, 102, 255, 0.3); }
            to { transform: scale(1.05); box-shadow: 0 20px 40px rgba(51, 102, 255, 0.4); }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: var(--primary-dark);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #4B5563;
            margin-bottom: 40px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.05), transparent);
            margin: 30px 0;
        }

        .contact-info {
            font-size: 15px;
            color: #6B7280;
        }

        .contact-info a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .contact-info a:hover {
            color: var(--primary-dark);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 26px; }
            p { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="card">
        <div class="logo-container">
            <img src="logo.png" alt="Cesar Pesoti Psicoterapia" class="img-logo">
        </div>
        
        <div class="status-badge">Suspensão Temporária</div>
        
        <div class="icon-wrapper">
            <i class="fas fa-clock"></i>
        </div>
        
        <h1>Atividades em Standby</h1>
        <p>Suspendemos as atividades de psicoterapia temporariamente. Durante este período, o site permanecerá fora do ar. Agradecemos a compreensão.</p>
        
        <div class="divider"></div>
        
        <div class="contact-info">
            Dúvidas ou informações:<br>
            <a href="mailto:contato@pesotipsicologonline.com.br">contato@pesotipsicologonline.com.br</a>
        </div>
    </div>
</body>
</html>
